services:
  - type: web
    name: greenclaw
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WAQI_API_KEY
        sync: false
      - key: ZAI_API_KEY
        sync: false
      - key: FLOCK_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MINTER_PRIVATE_KEY
        sync: false
